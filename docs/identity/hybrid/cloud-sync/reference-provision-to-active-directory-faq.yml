metadata:
  title: Provisioning to Active Directory with Microsoft Entra Cloud Sync FAQ
  description: This document describes frequently asked questions for cloud sync.
  manager: mwongerapk
  ms.service: entra-id
  ms.topic: faq
  ms.date: 06/09/2026
