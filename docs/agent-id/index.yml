### YamlMime:Marketing

title: Microsoft Entra Agent ID documentation
metadata:
  title: Microsoft Entra Agent ID documentation
  description: Build, secure, and manage agent identities with Microsoft Entra Agent ID. Integrate AI agents with enterprise workflows, apply Zero Trust principles, and govern agent access at scale.
  ms.service: entra-id
  ms.topic: hub-page
  author: shlipsey3
  ms.author: sarahlipsey
  ms.date: 03/05/2026

sections:

  # HERO BANNER ##############################################################################
  - componentType: hero
    title: Microsoft Entra Agent ID
    size: small
    textColor: light
    summary: Protect agent identities and secure their access to applications and resources. Part of Microsoft Agent 365, Microsoft Entra Agent ID and the Microsoft agent identity platform provide the foundation for secure and compliant AI agent deployments in the enterprise.
    background:
      componentType: image
      src: media/index/entra-banner.png
    links:
      - componentType: link
        url: ./what-is-microsoft-entra-agent-id.md
        text: Learn about Microsoft Entra Agent ID

  # GET STARTED CARDS (3 cards) ##############################################################
  - componentType: cards
    title: Get started with Microsoft Entra Agent ID
    summary: Learn about how Microsoft Entra Agent ID and Agent 365 work together so you can observe, govern, and secure agents across your organization.
    blocks:
      - componentType: card
        title: Manage agents
        summary: Learn how to manage all aspects of agents in your ecosystem, such as assigning sponsors and requesting access packages.
        imageUrl: media/index/hero-image-security-flow.png
        links:
          - componentType: link
            url: ./what-is-microsoft-entra-agent-id.md
            text: How it works
      - componentType: card
        title: Govern agent lifecycles
        summary: Ensure the lifecycle of your agents are governed with access reviews, entitlement management, and sponsor accountability.
        imageUrl: media/index/hero-image-entra-copilot-chat.png
        links:
          - componentType: link
            url: ../id-governance/agent-id-governance-overview?toc=/entra/agent-id/toc.json&bc=/entra/agent-id/breadcrumb/toc.json
            text: Get started
      - componentType: card
        title: Protect agent access to resources
        summary: Apply the same Zero Trust principles and access controls to your agents as you do for your users and workloads.
        imageUrl: media/index/hero-image-data-charts.png
        links:
          - componentType: link
            url: ./identity-platform/what-is-agent-id-platform.md
            text: Protect agents

  # FEATURE GRID #############################################################################
  - componentType: grid
    title: Build on the Microsoft agent identity platform
    summary: Build agents with enterprise-ready identities using the Microsoft agent identity platform.
    blocks:
      - componentType: summary-card
        title: Agent identity blueprints
        summary: Define reusable templates for agent identities with preconfigured permissions, policies, and settings.
        url: ./identity-platform/agent-blueprint.md
      - componentType: summary-card
        title:  Microsoft Entra SDK for agents
        summary: Integrate agent authentication and authorization with familiar SDKs and developer tools.
        url: ./identity-platform/microsoft-entra-sdk-for-agent-identities.md
      - componentType: summary-card
        title: OAuth protocols for agents
        summary: Understand how agents authenticate and obtain tokens using OAuth 2.0 flows optimized for AI workloads.
        url: ./identity-platform/agent-oauth-protocols.md
      - componentType: summary-card
        title: Security for AI
        summary: Explore how Microsoft Entra Agent ID integrates with Security for AI to protect your agents
        url: /security/security-for-ai/


  # A365 SECTION ###################################################################
  - componentType: cards
    title: Microsoft Agent 365
    summary: Microsoft Agent 365 is the control plane for managing and governing AI agents across your organization. Microsoft Entra Agent ID is the identity and access management solution for Microsoft Agent 365, providing a secure foundation for all your agent identities. Learn about how these products work together.
    blocks:
      - componentType: card
        title: Microsoft Agent 365 overview 
        summary: Learn about Microsoft Agent 365 and how it works with Microsoft Entra Agent ID.
        links:
          - componentType: link
            url: /microsoft-agent-365/overview
            text: Learn about Microsoft Agent 365
      - componentType: card
        title: Secure AI agents with Microsoft Agent 365
        summary: Learn how to secure AI agents at scale using Microsoft Agent 365 and Microsoft Entra Agent ID.
        links:
          - componentType: link
            url: /security/security-for-ai/agent-365-security?context=%2Fmicrosoft-agent-365%2Fcontext&view=o365-worldwide
            text: Get started