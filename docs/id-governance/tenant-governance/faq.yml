### YamlMime:FAQ
metadata:
  title: Frequently asked questions for Microsoft Entra tenant governance
  titleSuffix: Microsoft Entra ID Governance
  description: Find answers to common questions about Microsoft Entra tenant governance, including tenant discovery, governance relationships, and configuration management.
  author: barclayn
  ms.author: barclayn
  ms.service: entra-id-governance
  ms.topic: faq
  ms.date: 03/10/2026
title: Frequently asked questions for tenant governance
summary: |
  This article answers frequently asked questions about Microsoft Entra tenant governance.
sections:
  - name: Common platform questions
    questions:
      - question: "Can I manage tenant governance with Microsoft Graph APIs?"
        answer: |
          Yes, a set of Microsoft Graph APIs is available to manage tenant governance. For more information about these APIs, see the article <!-- TODO: Add link -->
      - question: "Are licenses required to use tenant governance?"
        answer: |
          Tenant governance offers free, basic, and premium capabilities. For a comprehensive list of license requirements per capability, see [Licensing for Microsoft Entra tenant governance](licensing.md).
      - question: "How does Microsoft Entra tenant governance relate to the multitenant organization feature?"
        answer: |
          Microsoft Entra tenant governance and the multitenant organization feature are complementary. Tenant governance enables tenant discovery, administrative access across tenants, and configuration monitoring within a tenant. The multitenant organization feature enables end-user collaboration across Microsoft Entra tenants within Microsoft 365 services. Within an organization, the list of tenants related by governance relationships is managed independently of the list of tenants within a multitenant organization.
  - name: Related tenants
    questions:
      - question: "What do I do if tenant governance shows me a related tenant that I don't recognize?"
        answer: |
          Start by checking whether the tenant shares your Commerce billing account. A shared billing account often indicates a tenant you might need to govern. Users in that tenant might have permissions to access or modify the billing account, or they might have subscriptions paid for under your billing account.

          You can also look at B2B collaboration signals and multitenant application usage between your tenant and the related tenant. B2B registration and sign-in patterns might reveal interactions you recognize.

          You might also use email scanning capabilities to detect administration emails about those other tenants. When needed, reach out to the users involved using your organization's communication tools, such as Exchange Online or Teams, to understand why the relationship exists.
      - question: "How can I protect my organization if an administrator of another tenant doesn't approve my tenant governance request?"
        answer: |
          If administrators of another tenant reject or don't respond to your governance request, you can run a quarantine workflow that protects your organization from actions of the related tenant. Follow the steps in [Quarantine unsanctioned tenants](/entra/fundamentals/quarantine-unsanctioned-tenants) to block users or applications in the other tenant from accessing your resources. This approach protects the security and privacy of data in your tenant.

          You can also cut off outbound B2B user access or Commerce service provisioning as a test, which could prompt the other tenant to reconsider your request.
  - name: Governance relationships
    questions:
      - question: "How does tenant governance relate to B2B capabilities?"
        answer: |
          Some customers have used B2B accounts for multi-tenant administration. This approach requires roles to be assigned per B2B user in every tenant. Granular delegated admin privileges (GDAP) doesn't replace B2B collaboration features. However, for multi-tenant administration needs, customers might find that assigning and maintaining least-privileged permissions is easier with GDAP accounts in governance relationships.
      - question: "I'm a Microsoft partner in the Partner Center program. Can I use these capabilities to manage customer tenants?"
        answer: |
          Tenant governance relationships aren't currently supported for Microsoft partners with existing [GDAP relationships configured through Partner Center](/partner-center/customers/gdap-introduction).
      - question: "Can governed tenants independently remove the tenant governance relationship and related permissions?"
        answer: |
          A governed tenant can always terminate the governance relationship. Administrators in the governing tenant see that the governed tenant terminated the relationship and receive an email notification.
      - question: "Do you support multi-tier relationships?"
        answer: |
          No. Multi-tier relationships aren't currently supported. For example, you can't set up a governance relationship where Tenant A governs Tenant B and Tenant B governs Tenant C. A tenant can't be both a governing and a governed tenant. If the system detects that a relationship setup would break this rule, API calls fail.
      - question: "Do governance relationships support PIM?"
        answer: |
          Yes, you can use [PIM for Groups](/entra/id-governance/privileged-identity-management/concept-pim-for-groups) so that admins must activate group membership before using GDAP access configured in the relationship to manage other tenants.
      - question: "Do you support multiple relationships between tenants?"
        answer: |
          You can set up multiple relationships between tenants, but there are unique behaviors to note:

          - Each relationship must be configured with a unique governance policy template.

          - Relationship updates are currently additive. For example, if you initially set up a relationship that grants Global Administrator, and then update the relationship with Security Reader, governing tenant admins have both Global Administrator and Security Reader role assignments.

          - Terminating a relationship deletes all resources in the governed tenant that were provisioned when the relationship was created or updated. If other relationships between the two tenants are configured with the same resources, those resources are also deleted.
  - name: Configuration management
    questions:
      - question: "What Microsoft services and resources can I monitor?"
        answer: |
          You can monitor any of over 200 resource types supported by Microsoft tenant configuration APIs. These resources span Microsoft Entra, Intune, Exchange Online, Teams, and Security & Compliance (Defender and Purview).
      - question: |
          What does a configuration baseline look like, and how do you create one?
        answer: |
          A configuration baseline is a declarative JSON representation of the desired tenant configuration state. You can author it manually or generate a starting baseline. Use Snapshot APIs to extract the tenant's current configuration, and then edit it into the desired state you want to enforce.
      - question: "How often do monitors run, and can you control the monitoring frequency?"
        answer: |
          After you create a monitor, it runs periodically on your behalf. Currently, the default run frequency is six hours. If configurable frequency is supported in the future, it's documented as part of the monitor creation or update experience.
      - question: "Are there any limits on how large a baseline can be?"
        answer: |
          Currently, a monitor or baseline can include up to a maximum of 200 resource instances per baseline or monitor. The overall limit to monitor per day is 800 resource instances.
      - question: "How do I view drift details?"
        answer: |
          You can retrieve drift information through the configuration drifts API or view it in the admin center (where available). The documentation includes a GET endpoint for retrieving drifts and describes a drift log experience.
      - question: "If the monitoring service detects a configuration drift, how can I get the resource back to the right state?"
        answer: |
          Use the tool of your choice to update the configuration of the resource, such as the admin center, PowerShell, or Graph API. The next time the monitor runs, it detects that the resource matches the configuration baseline. The monitoring service then automatically marks the configuration drift as no longer active.
      - question: "Can I monitor configuration across multiple tenants using the same configuration baseline?"
        answer: |
          You can reuse the same configuration baseline file to create monitors in different tenants. To create a monitor in multiple tenants, or to detect configuration drifts in multiple tenants, sign in to each tenant individually and perform the task in that tenant.
      - question: "Can I manage Azure resources in my tenants?"
        answer: |
          You can use a custom multi-tenant application to manage Azure resources in each of your governed tenants. For example, your app could deploy Azure Policy resources to all or selected management groups in your existing and new tenants. Microsoft Entra tenant governance makes it easy to provision your custom application to each governed tenant where the app is needed.
